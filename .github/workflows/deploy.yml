name: Backend Deploy to GCP

# main 브랜치에 코드가 push 될 때마다 이 스크립트가 실행됩니다.
on:
  push:
    branches: [ "main" ] # 본인의 기본 브랜치명이 master라면 master로 변경하세요.

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 내 깃허브 코드 가져오기
        uses: actions/checkout@v4

      - name: 2. GCP 서버로 코드 전송하기 (backend 폴더로)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          source: "."
          target: "~/hsproject/backend"

      - name: 3. GCP 서버에 접속해서 도커 실행하기
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            cd ~/hsproject

            # 전체를 꺼버리는 down 명령어 삭제 (DB와 Redis를 안전하게 유지)
            # 백엔드(backend) 컨테이너만 딱 짚어서 다시 빌드하고 재실행
            docker-compose up -d --build backend