<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>환승페이 충전하기</title>
    <script th:src="@{/jquery/3.7.0/jquery.js}"></script>
    <script src="https://cdn.iamport.kr/v1/iamport.js"></script>
    <script>
        // 1. 아임포트 초기화 (기존 코드와 동일)
        IMP.init('[[${keymap.customerKey}]]');

        function chargePay() {
            // 사용자가 선택/입력한 충전 금액 가져오기
            let amount = parseInt(document.getElementById("charge_amount").value);

            if(!amount || amount <= 0) {
                alert("충전할 금액을 올바르게 입력해주세요.");
                return;
            }

            // 2. 아임포트 결제창 호출
            IMP.request_pay({
                channelKey: '[[${keymap.channelKey}]]',
                pay_method: "card",
                merchant_uid: `charge-${crypto.randomUUID()}`, // 충전용 고유 주문번호 생성
                name: "환승페이 충전",
                amount: amount,
                buyer_email: "user@example.com", // 실제로는 로그인한 유저의 정보를 세션에서 가져와야 합니다.
                buyer_name: "홍길동",
                buyer_tel: "010-1234-5678"
            }, function (response) {
                // 3. 결제창 종료 후 콜백 함수
                if (response.error_code != null) {
                    alert('결제를 취소했거나 실패했습니다: ' + response.error_msg);
                    return;
                }

                // 결제가 성공적으로 보이면, 서버(스프링)로 검증을 요청합니다.
                verifyAndCharge(response.imp_uid, response.merchant_uid, amount);
            });
        }

        // 서버에 결제 내역을 확인하고 포인트를 지급해달라고 요청하는 함수
        function verifyAndCharge(imp_uid, merchant_uid, requestedAmount) {
            $.ajax({
                url: "/verifyCharge",
                method: "post",
                data: JSON.stringify({
                    imp_uid: imp_uid,
                    merchant_uid: merchant_uid,
                    amount: requestedAmount
                }),
                contentType: "application/json; charset=UTF-8",
                success: function(res) {
                    if(res === "success") {
                        alert("환승페이 충전이 완료되었습니다!");
                        location.href = "/index"; // 충전 성공 시 메인으로 이동
                    } else {
                        alert("결제 검증에 실패했습니다. 결제가 취소됩니다.");
                    }
                },
                error: function(err) {
                    console.log('err', err);
                    alert("서버 통신 중 오류가 발생했습니다.");
                }
            });
        }
    </script>
</head>
<body>
<h1>환승페이 충전</h1>

<div>
    <h3>충전 금액 선택</h3>
    충전할 금액: <input type="number" id="charge_amount" step="1000" placeholder="1000원 단위 입력"> 원
    <br><br>
    <button onclick="chargePay()">충전하기</button>
</div>
</body>
</html>
